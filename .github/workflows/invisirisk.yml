name: sqlmodel x InvisiRisk

on:
  schedule:
    - cron: '20 0 * * 1'  # every Monday morning
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/workflows/*'

permissions:
  checks: write
  contents: write
  packages: read
  actions: write

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    name: Sync fork and Run build

    steps:
      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      # Set up Git user identity
      - name: Set up Git user identity
        run: |
          git config user.name "ir-bibekpradhan"
          git config user.email "bibek.pradhan@invisirisk.com"

      # Sync with upstream (original repository)
      - name: Sync with upstream (original repository)
        run: |
          git remote add upstream https://github.com/fastapi/sqlmodel.git
          git fetch upstream
          git checkout main
          git merge upstream/main --no-edit

      # Use PAT from Organization Secrets to push to the repo
      - name: Push changes to organization's repository
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.MY_PAT }}@github.com/IR-Opensource/sqlmodel.git
          git push origin main  # Push to your organization's repo

      # Setup Python environment
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # Install dependencies from requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
