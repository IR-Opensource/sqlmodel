jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    name: Sync fork and Run build

    steps:
      # ============= InvisiRisk Setup =============
      - name: Setup PSE
        uses: invisirisk/pse-action@latest
        with:
          app_token: ${{ secrets.IR_API_KEY }}
      # ============= InvisiRisk Setup End =============

      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      # Set up Git user identity to prevent errors with commits
      - name: Set up Git user identity
        run: |
          git config user.name "ir-bibekpradhan"  # Set your Git username
          git config user.email "bibek.pradhan@invisirisk.com"  # Set your Git email

      # Sync with upstream (original repository)
      - name: Sync with upstream (original repository)
        run: |
          git remote add upstream https://github.com/fastapi/sqlmodel.git  # Original repo
          git fetch upstream
          git checkout main
          git merge upstream/main --no-edit
          git push https://x-access-token:${{ secrets.MY_PAT }}@github.com/ir-bibekpradhan/sqlmodel main  # Push to your fork

      # Setup Python environment
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # Install dependencies from requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ============= InvisiRisk Cleanup =============
      - name: Cleanup PSE
        if: always()
        uses: invisirisk/pse-action@latest
        with:
          cleanup: "true"
      # ============= InvisiRisk Cleanup End =============
